<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港股通 - 股票信息分析平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">股票信息分析平台</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/stock_info">个股信息</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/lhb">龙虎榜</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/hkstock">港股通</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="jumbotron text-center">
            <h1 class="display-4">港股通数据分析</h1>
            <p class="lead">该功能正在建设中，目前仅支持数据获取测试</p>
            <hr class="my-4">
            <div class="mt-4">
                <button id="fetchDataBtn" class="btn btn-primary btn-lg">获取港股通数据</button>
            </div>
            <div id="resultArea" class="mt-4">
                <div id="loadingDiv" class="d-none">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p>正在获取数据，请稍候...</p>
                </div>
                <div id="resultDiv" class="mt-3 text-start d-none">
                    <h5>数据获取结果：</h5>
                    <pre id="jsonResult" class="bg-light p-3" style="max-height: 500px; overflow: auto;"></pre>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer mt-auto py-3 bg-light">
        <div class="container text-center">
            <span class="text-muted">© 2024 股票信息分析平台</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('fetchDataBtn').addEventListener('click', function() {
            const loadingDiv = document.getElementById('loadingDiv');
            const resultDiv = document.getElementById('resultDiv');
            const jsonResult = document.getElementById('jsonResult');
            
            // 显示加载中
            loadingDiv.classList.remove('d-none');
            resultDiv.classList.add('d-none');
            
            // 发起API请求
            fetch('/api/hkstock')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('网络响应不正常');
                    }
                    return response.json();
                })
                .then(data => {
                    // 隐藏加载中
                    loadingDiv.classList.add('d-none');
                    
                    // 显示结果
                    jsonResult.textContent = JSON.stringify(data, null, 2);
                    resultDiv.classList.remove('d-none');
                })
                .catch(error => {
                    // 隐藏加载中
                    loadingDiv.classList.add('d-none');
                    
                    // 显示错误信息
                    jsonResult.textContent = '获取数据失败: ' + error.message;
                    resultDiv.classList.remove('d-none');
                });
        });
    </script>
</body>
</html>
