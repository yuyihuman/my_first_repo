<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>港股通北向 - 股票信息分析平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/common.css') }}">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
    <style>
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">股票信息分析平台</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/stock_info">个股信息</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/lhb">龙虎榜</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/hkstock">港股通南向</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="/northbound">港股通北向</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="jumbotron">
            <h1 class="display-4 text-center">港股通北向数据分析</h1>
            <p class="lead text-center">北向资金流向分析</p>
            <hr class="my-4">
            
            <div id="updateInfo" class="alert alert-info text-center">
                正在加载数据，请稍候...
            </div>
            
            <div class="row mt-4">
                <div class="col-md-6 mx-auto">
                    <div class="card">
                        <div class="card-body text-center">
                            <h5 class="card-title">数据查询</h5>
                            <button id="fetchDataBtn" class="btn btn-primary mt-3">
                                <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status" aria-hidden="true"></span>
                                获取最新数据
                            </button>
                            <div id="fetchStatus" class="mt-3"></div>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="row mt-4">
                <div class="col-12">
                    <div class="card">
                        <div class="card-header bg-primary text-white">
                            <h5 class="mb-0">领涨股统计 (出现频率最高的20只股票)</h5>
                        </div>
                        <div class="card-body">
                            <div id="leadingStocksLoading" class="text-center">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Loading...</span>
                                </div>
                                <p class="mt-2">加载中...</p>
                            </div>
                            <div id="leadingStocksTable" class="table-responsive" style="display: none;">
                                <table class="table table-striped table-hover">
                                    <thead>
                                        <tr>
                                            <th>排名</th>
                                            <th>股票名称</th>
                                            <th>股票代码</th>
                                            <th>领涨次数</th>
                                        </tr>
                                    </thead>
                                    <tbody id="leadingStocksBody">
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer mt-auto py-3 bg-light">
        <div class="container text-center">
            <span class="text-muted">© 2024 股票信息分析平台</span>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 页面加载完成后立即获取数据
            fetchNorthboundData();
            
            // 为获取数据按钮添加点击事件
            document.getElementById('fetchDataBtn').addEventListener('click', function() {
                const button = this;
                const spinner = document.getElementById('btnSpinner');
                const fetchStatus = document.getElementById('fetchStatus');
                
                // 显示加载状态
                button.disabled = true;
                spinner.classList.remove('d-none');
                fetchStatus.innerHTML = '<div class="alert alert-info">正在获取最新数据，请稍候...</div>';
                
                // 调用API获取最新数据
                fetch('/api/northbound?refresh=true')
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('网络响应不正常');
                        }
                        return response.json();
                    })
                    .then(data => {
                        // 更新页面数据
                        updatePageData(data);
                        fetchStatus.innerHTML = '<div class="alert alert-success">数据已更新！</div>';
                    })
                    .catch(error => {
                        console.error('获取数据失败:', error);
                        fetchStatus.innerHTML = `<div class="alert alert-danger">获取数据失败: ${error.message}</div>`;
                    })
                    .finally(() => {
                        // 恢复按钮状态
                        button.disabled = false;
                        spinner.classList.add('d-none');
                    });
            });
        });
        
        function fetchNorthboundData() {
            fetch('/api/northbound')
                .then(response => {
                    if (!response.ok) {
                        throw new Error('网络响应不正常');
                    }
                    return response.json();
                })
                .then(data => {
                    updatePageData(data);
                })
                .catch(error => {
                    console.error('获取数据失败:', error);
                    document.getElementById('updateInfo').innerHTML = 
                        `<div class="alert alert-danger">获取数据失败: ${error.message}</div>`;
                });
        }
        
        function updatePageData(data) {
            // 更新数据更新时间信息
            document.getElementById('updateInfo').innerHTML = 
                `<div class="alert alert-success">数据最后更新时间: ${data.update_time}</div>`;
            
            // 更新领涨股表格
            updateLeadingStocksTable(data.top_leading_stocks);
        }
        
        function updateLeadingStocksTable(leadingStocks) {
            const tableBody = document.getElementById('leadingStocksBody');
            const loadingDiv = document.getElementById('leadingStocksLoading');
            const tableDiv = document.getElementById('leadingStocksTable');
            
            // 清空表格
            tableBody.innerHTML = '';
            
            // 填充表格数据
            leadingStocks.forEach((stock, index) => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${index + 1}</td>
                    <td>${stock.name}</td>
                    <td>${stock.code}</td>
                    <td>${stock.count}</td>
                `;
                tableBody.appendChild(row);
            });
            
            // 隐藏加载提示，显示表格
            loadingDiv.style.display = 'none';
            tableDiv.style.display = 'block';
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
